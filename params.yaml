model:
  iterations: 1200
  depth: 8
  learning_rate: 0.02
  l2_leaf_reg: 7
  bagging_temperature: 0.8
  random_strength: 2.0
  border_count: 128
  auto_class_weights: "Balanced"
  loss_function: "Logloss"
  eval_metric: "AUC"
  subsample: 0.8
  od_type: "Iter"
  od_wait: 50
  verbose: 0
  random_state: 42

